name: safe-route-env
description: AI-powered safe route optimization environment for women and solo travelers
type: openenv/environment
version: "1.0"

entrypoint:
  module: app
  object: app

api:
  reset: /reset
  step: /step
  state: /state

observation_space:
  type: object
  properties:
    time_of_day:
      type: string
    routes:
      type: array
      items:
        type: object
        properties:
          crime_rate:
            type: number
          lighting_level:
            type: number
          crowd_density:
            type: number
          distance:
            type: number
          dynamic_risk:
            type: number

action_space:
  type: string
  enum:
    - route_1
    - route_2
    - route_3

reward:
  type: number
  minimum: 0.0
  maximum: 1.0

tasks:
  - name: easy
    description: Choose route based only on lowest crime_rate
  - name: medium
    description: Consider crime_rate, lighting_level, and crowd_density
  - name: hard
    description: Optimize safety, distance, and time trade-offs
