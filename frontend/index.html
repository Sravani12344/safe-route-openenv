<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safe Route AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <!-- Leaflet enabled for Custom Multi-Polyline rendering capability -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
    <div class="ambient-background">
        <div class="blob animate-blob1"></div>
        <div class="blob animate-blob2"></div>
    </div>

    <main class="app-container glass-panel">
        <header class="app-header">
            <div class="title-wrapper">
                <div class="logo">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 22s-8-4.5-8-11.8A8 8 0 0 1 12 2a8 8 0 0 1 8 8.2c0 7.3-8 11.8-8 11.8z"/><circle cx="12" cy="10" r="3"/></svg>
                </div>
                <h1>Safe Route <span>AI</span></h1>
            </div>
            <p class="subtitle">Dynamic safety analysis for solo routing.</p>
        </header>

        <!-- User Input Section -->
        <section class="input-section">
            <div class="card">
                <form id="route-form">
                    <div class="input-form">
                        <div class="form-group" style="flex: 1;">
                            <label>Source Location</label>
                            <input type="text" id="source-input" value="" placeholder="e.g., Ramapuram, Chennai">
                        </div>
                        <div class="form-group" style="flex: 1;">
                            <label>Destination Location</label>
                            <input type="text" id="dest-input" value="" placeholder="e.g., Ashok Nagar, Chennai">
                        </div>
                        <div class="form-group" style="flex: 0.5;">
                            <label>Time</label>
                            <select id="time-input" style="padding: 0.8rem 1rem; border-radius: 8px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.2); color: white; font-size: 1rem; font-family: inherit; width: 100%;">
                                <option value="DAY" style="color: black;">DAY</option>
                                <option value="NIGHT" style="color: black;" selected>NIGHT</option>
                            </select>
                        </div>
                    </div>
                </form>
            </div>
        </section>

        <!-- Current Scenario Card -->
        <section class="scenario-section">
            <div class="card scenario-card">
                <h2>Active Scenario Target</h2>
                <div class="scenario-details">
                    <div class="location-group">
                        <span class="label">From</span>
                        <span id="source-loc" class="value text-highlight">Loading...</span>
                    </div>
                    <div class="path-divider">→</div>
                    <div class="location-group">
                        <span class="label">To</span>
                        <span id="dest-loc" class="value text-highlight">Loading...</span>
                    </div>
                </div>
                <div class="time-badge" id="time-badge">
                    <span id="time-val">DAY</span>
                </div>
            </div>
        </section>

        <!-- Dynamic Real Map View -->
        <section class="map-section">
            <div class="card map-card" style="padding: 0; overflow: hidden; border: 1px solid var(--glass-border); position: relative; z-index: 1;">
                <div id="real-map" style="width: 100%; height: 400px; background: rgba(0,0,0,0.5); z-index: 1;"></div>
            </div>
        </section>

        <!-- Routes Comparison -->
        <section class="routes-section">
            <div class="routes-grid" id="routes-container">
                <!-- Route Cards will be injected by JS -->
            </div>
        </section>

        <!-- Final System Recommendation -->
        <section class="decision-section">
            <div class="card decision-card glow">
                <h2>AI Decision Engaged</h2>
                
                <div class="decision-content">
                    <div class="decision-item">
                        <span class="label">Selected</span>
                        <span id="res-route" class="value highlight-accent">Route 1</span>
                    </div>
                    
                    <div class="decision-metrics">
                        <div class="metric-circle">
                            <svg class="circular-chart" viewBox="0 0 36 36">
                                <path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                                <path id="score-circle" class="circle-fg" stroke-dasharray="85, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                                <text id="res-score" x="18" y="20.35" class="percentage">0.85</text>
                            </svg>
                            <span class="label">Safety Score</span>
                        </div>
                        
                        <div class="risk-indicator" id="risk-badge">
                            LOW RISK
                        </div>
                    </div>
                </div>
                
                <div class="reasoning-box">
                    <strong>Reason:</strong> 
                    <ul id="res-reason-list" class="reason-list">
                    </ul>
                </div>
            </div>
        </section>

        <!-- Action Area -->
        <div class="action-footer">
            <button id="simulate-btn" class="btn-primary glow-on-hover">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
                Find Safe Route
            </button>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
