name: SafeRouteEnv
description: >
  AI-Powered Safe Route Optimization for Women and Solo Travelers. 
  Simulates a real-world environment where an AI agent selects the safest 
  route between a source and destination using multiple safety factors.
type: openenv/environment
version: "1.0"

environment:
  state_type: dictionary
  action_type: discrete_string
  reward_type: continuous

tasks:
  - name: easy
    description: Choose route based only on lowest crime_rate
  - name: medium
    description: Consider crime_rate, lighting_level, and crowd_density
  - name: hard
    description: Optimize safety, distance, and time trade-offs
